const W=160, H=90;

function buildBase(grid, pal){
  const off=document.createElement('canvas'); off.width=W; off.height=H;
  const c=off.getContext('2d'); const img=c.createImageData(W,H);
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const ci=+grid[y][x]; const hex=pal[ci];
    const k=(y*W+x)*4;
    img.data[k]  =parseInt(hex.slice(1,3),16);
    img.data[k+1]=parseInt(hex.slice(3,5),16);
    img.data[k+2]=parseInt(hex.slice(5,7),16);
    img.data[k+3]=255;
  }
  c.putImageData(img,0,0); return off;
}

function mountMap(ch){
  const card=document.createElement('div'); card.className='card';
  card.innerHTML=`
    <div class="screen"><canvas width="${W}" height="${H}"></canvas></div>
    <div class="meta"><div>
      <div class="ch">CHAPTER 0${ch.n}</div>
      <div class="name">${ch.name}</div>
      <div class="boss">${ch.boss}</div>
    </div></div>
    <div class="chips">${ch.pal.map(h=>`<i style="background:${h}" title="${h}"></i>`).join('')}</div>`;
  document.getElementById('maps').appendChild(card);

  const cv=card.querySelector('canvas'), ctx=cv.getContext('2d');
  const base=buildBase(SCENES[String(ch.n)], ch.pal);
  const [x0,x1]=ch.band||[0,W];
  const ps=Array.from({length:ch.cnt},()=>({
    x:x0+Math.random()*(x1-x0), y:Math.random()*H,
    c:ch.pal[ch.pc[Math.random()<.7?0:1]],
    s:.4+Math.random()*.8
  }));
  function tick(){
    ctx.drawImage(base,0,0);
    for(const p of ps){
      ctx.fillStyle=p.c; ctx.fillRect(p.x|0,p.y|0,1,1);
      p.x+=ch.drift[0]*p.s; p.y+=ch.drift[1]*p.s;
      if(p.y<0)p.y=H-1; if(p.y>=H)p.y=0;
      if(p.x<x0)p.x=x1-1; if(p.x>=x1)p.x=x0;
    }
  }
  tick(); setInterval(tick, 110);
}

function mountHero(rows, info){
  const card=document.createElement('div'); card.className='card hero';
  card.innerHTML=`
    <div class="screen"><canvas width="36" height="22"></canvas></div>
    <div class="meta"><div>
      <div class="ch">SURVIVOR</div>
      <div class="name">${info.name}</div>
    </div></div>
    <div class="quote">${info.q}</div>`;
  document.getElementById('heroes').appendChild(card);
  const ctx=card.querySelector('canvas').getContext('2d');
  let bob=0;
  function draw(){
    ctx.fillStyle=HERO_PAL[0]; ctx.fillRect(0,0,36,22);
    ctx.fillStyle=HERO_PAL[2];
    for(let x=0;x<36;x+=2) ctx.fillRect(x,20,1,1);
    const oy=4+bob;
    rows.forEach((row,j)=>{ [...row].forEach((chr,i)=>{
      if(chr!=='.'){ ctx.fillStyle=HERO_PAL[+chr]; ctx.fillRect(12+i,oy+j-(bob&&j>=12?1:0),1,1); }
    });});
    bob=bob?0:1;
  }
  draw(); setInterval(draw, 600);
}

CHAPTERS.forEach(mountMap);
HERO_INFO.forEach((info,i)=>mountHero(HEROES[info.name], info));

  btn.setAttribute('aria-pressed', on);
});
